spring:
  datasource:
    url: jdbc:mysql://localhost:3306/TomaFlowDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:tomaflow-super-secret-key-change-in-production-min-256-bits!!}
  expiration-ms: 86400000  # 24 hours

server:
  port: 8080
